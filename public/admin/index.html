<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Fix Pro — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }

    /* Login */
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; padding: 40px; width: 380px; text-align: center; }
    .login-box h1 { font-size: 20px; color: #2dd4bf; margin-bottom: 4px; }
    .login-box p { font-size: 13px; color: #555; margin-bottom: 24px; }
    .login-box input { width: 100%; background: #12122a; border: 1px solid #2d2d44; border-radius: 8px; color: #e0e0e0; font-size: 15px; padding: 12px 14px; margin-bottom: 10px; }
    .login-box input:focus { outline: none; border-color: #2dd4bf; }
    .btn-primary { background: #0d9488; color: white; border: none; border-radius: 8px; padding: 13px 20px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-primary:hover { background: #0f766e; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary.full { width: 100%; }
    .login-error { color: #f87171; font-size: 13px; margin-top: 10px; display: none; }

    /* Layout */
    .app { display: none; }
    .topbar { background: #1a1a2e; border-bottom: 1px solid #2d2d44; padding: 0 28px; display: flex; align-items: center; gap: 24px; height: 54px; }
    .topbar-brand { font-size: 15px; font-weight: 700; color: #2dd4bf; }
    .topbar-tabs { display: flex; gap: 2px; flex: 1; }
    .tab-btn { background: none; border: none; color: #555; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .tab-btn:hover { color: #e0e0e0; background: #2d2d44; }
    .tab-btn.active { color: #2dd4bf; background: #12122a; }
    .btn-logout { background: none; border: 1px solid #2d2d44; color: #555; border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer; }
    .btn-logout:hover { color: #e0e0e0; border-color: #555; }

    .content { padding: 28px; max-width: 1200px; margin: 0 auto; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Summary */
    .summary { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 10px; padding: 16px 18px; }
    .stat .label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 6px; }
    .stat .value { font-size: 22px; font-weight: 700; }
    .stat.teal .value { color: #2dd4bf; }
    .stat.green .value { color: #34d399; }
    .stat.red .value { color: #f87171; }
    .stat.amber .value { color: #fbbf24; }
    .stat.blue .value { color: #60a5fa; }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .btn-add { background: #0d9488; color: white; border: none; border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-add:hover { background: #0f766e; }
    .btn-ghost { background: #2d2d44; color: #aaa; border: none; border-radius: 8px; padding: 9px 16px; font-size: 13px; cursor: pointer; }
    .btn-ghost:hover { background: #3a3a55; color: #e0e0e0; }
    .toolbar-right { margin-left: auto; font-size: 12px; color: #555; }

    /* Table */
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid #2d2d44; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #12122a; }
    th { padding: 10px 14px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #555; font-weight: 600; white-space: nowrap; }
    td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid #1a1a2e; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #1a1a2e; cursor: pointer; }

    .badge { display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; border-radius: 4px; padding: 3px 8px; }
    .badge.completed { background: #064e3b; color: #34d399; }
    .badge.turned_away { background: #3a1a1a; color: #f87171; }

    .btn-edit { background: #1e3a5f; color: #60a5fa; border: 1px solid #1d4ed8; border-radius: 6px; padding: 5px 12px; font-size: 11px; cursor: pointer; white-space: nowrap; }
    .btn-edit:hover { background: #1d4ed8; color: white; }
    .btn-del { background: #3a1a1a; color: #f87171; border: 1px solid #7f1d1d; border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; margin-left: 6px; }
    .btn-del:hover { background: #7f1d1d; color: white; }

    .profit-pos { color: #34d399; font-weight: 700; }
    .profit-neg { color: #f87171; font-weight: 700; }
    .muted { color: #555; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1a1a2e; border: 1px solid #2d2d44; border-radius: 12px; width: 580px; max-width: 96vw; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #2d2d44; display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 16px; color: #e0e0e0; font-weight: 700; }
    .btn-close { background: none; border: none; color: #555; font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px; }
    .btn-close:hover { color: #e0e0e0; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #2d2d44; display: flex; gap: 10px; justify-content: flex-end; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #555; font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea {
      background: #12122a; border: 1px solid #2d2d44; border-radius: 6px;
      color: #e0e0e0; font-size: 13px; padding: 9px 11px; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #2dd4bf; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group select option { background: #1a1a2e; }
    .subscriber-preview { font-size: 12px; color: #2dd4bf; margin-top: 4px; min-height: 16px; }

    .modal-error { color: #f87171; font-size: 13px; margin-bottom: 12px; display: none; }

    /* Search filter */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input { width: 100%; background: #12122a; border: 1px solid #2d2d44; border-radius: 8px; color: #e0e0e0; font-size: 13px; padding: 9px 14px 9px 36px; }
    .search-wrap input:focus { outline: none; border-color: #2dd4bf; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #555; font-size: 14px; pointer-events: none; }

    .empty-state { text-align: center; padding: 60px 20px; color: #555; font-size: 14px; }

    /* Leads table extras */
    .lead-desc { font-size: 11px; color: #555; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Screen Fix Pro</h1>
    <p>Admin Portal</p>
    <input type="text" id="apiUrlInput" placeholder="API URL" value="https://www.screenfixpro.com">
    <input type="password" id="keyInput" placeholder="Admin key" onkeydown="if(event.key==='Enter') login()">
    <button class="btn-primary full" onclick="login()" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError">Incorrect key or unreachable API.</div>
  </div>
</div>

<!-- App -->
<div class="app" id="app">
  <div class="topbar">
    <span class="topbar-brand">Screen Fix Pro</span>
    <div class="topbar-tabs">
      <button class="tab-btn active" onclick="switchTab('jobs')" id="tab-jobs">Jobs</button>
      <button class="tab-btn" onclick="switchTab('leads')" id="tab-leads">Leads</button>
    </div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>

  <div class="content">
    <!-- Jobs Tab -->
    <div class="tab-panel active" id="panel-jobs">
      <div class="summary" id="summary"></div>
      <div class="toolbar">
        <button class="btn-add" onclick="openAddJob()">+ Add Job</button>
        <button class="btn-ghost" onclick="loadJobs()">Refresh</button>
        <span class="toolbar-right" id="jobsMeta"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Customer</th>
              <th>City</th>
              <th>Type</th>
              <th>Screens</th>
              <th>Status</th>
              <th>Payment</th>
              <th>Revenue</th>
              <th>Materials</th>
              <th>Profit</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="jobsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Leads Tab -->
    <div class="tab-panel" id="panel-leads">
      <div class="toolbar">
        <button class="btn-ghost" onclick="loadLeads()">Refresh</button>
        <span class="toolbar-right" id="leadsMeta"></span>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="leadsSearch" placeholder="Search by name, email, city..." oninput="filterLeads()">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>City</th>
              <th>Service</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody id="leadsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Job Modal -->
<div class="modal-overlay" id="jobModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Job</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-error" id="modalError"></div>
      <div class="form-grid">

        <div class="form-group full" id="subscriberGroup">
          <label>Subscriber</label>
          <select id="fSubscriber" onchange="onSubscriberChange()">
            <option value="">— select a customer —</option>
          </select>
          <div class="subscriber-preview" id="subscriberPreview"></div>
        </div>
        <div class="form-group" id="subscriberReadGroup" style="display:none">
          <label>Customer</label>
          <input type="text" id="fSubscriberDisplay" readonly style="color:#2dd4bf">
        </div>

        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="completed">Completed</option>
            <option value="turned_away">Turned Away</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date Completed</label>
          <input type="date" id="fDate">
        </div>

        <div class="form-group">
          <label>Job Type</label>
          <select id="fType">
            <option value="window">Window</option>
            <option value="door">Door</option>
            <option value="mixed">Mixed</option>
            <option value="repair">Repair Only</option>
          </select>
        </div>

        <div class="form-group">
          <label>Revenue ($)</label>
          <input type="number" id="fRevenue" min="0" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group">
          <label>Materials Cost ($)</label>
          <input type="number" id="fMaterials" min="0" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group">
          <label>Screens Count</label>
          <input type="number" id="fScreens" min="0" placeholder="1">
        </div>

        <div class="form-group">
          <label>Payment Method</label>
          <select id="fPayment">
            <option value="">— select —</option>
            <option value="check">Check</option>
            <option value="cash">Cash</option>
            <option value="venmo">Venmo</option>
            <option value="card">Card</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Invoice Number</label>
          <input type="text" id="fInvoice" placeholder="SFP-2026-XXX">
        </div>

        <div class="form-group full">
          <label>Notes</label>
          <textarea id="fNotes" placeholder="Any notes..."></textarea>
        </div>

      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveJob()" id="saveBtn">Save Job</button>
    </div>
  </div>
</div>

<script>
  let API_BASE = '';
  let ADMIN_KEY = '';
  let allJobs = [];
  let allLeads = [];
  let editingJobId = null;

  // ── Auth ──

  function login() {
    API_BASE = document.getElementById('apiUrlInput').value.replace(/\/$/, '');
    ADMIN_KEY = document.getElementById('keyInput').value.trim();
    if (!ADMIN_KEY) { showLoginError('Enter your admin key.'); return; }

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    apiFetch('/api/jobs')
      .then(() => {
        sessionStorage.setItem('sfp_api', API_BASE);
        sessionStorage.setItem('sfp_key', ADMIN_KEY);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadJobs();
      })
      .catch(() => {
        showLoginError('Incorrect key or unreachable API.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      });
  }

  function logout() {
    sessionStorage.removeItem('sfp_api');
    sessionStorage.removeItem('sfp_key');
    location.reload();
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
    const btn = document.getElementById('loginBtn');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }

  // Auto-login from session
  window.addEventListener('DOMContentLoaded', () => {
    const savedApi = sessionStorage.getItem('sfp_api');
    const savedKey = sessionStorage.getItem('sfp_key');
    if (savedApi && savedKey) {
      document.getElementById('apiUrlInput').value = savedApi;
      document.getElementById('keyInput').value = savedKey;
      API_BASE = savedApi;
      ADMIN_KEY = savedKey;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadJobs();
    }
  });

  // ── API helper ──

  async function apiFetch(path, options = {}) {
    const res = await fetch(API_BASE + path, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        'x-admin-key': ADMIN_KEY,
        ...(options.headers || {})
      }
    });
    if (res.status === 401) throw new Error('Unauthorized');
    if (!res.ok) throw new Error('API error ' + res.status);
    return res.json();
  }

  // ── Tabs ──

  function switchTab(tab) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'leads' && allLeads.length === 0) loadLeads();
  }

  // ── Jobs ──

  async function loadJobs() {
    document.getElementById('jobsMeta').textContent = 'Loading...';
    try {
      allJobs = await apiFetch('/api/jobs');
      renderJobs();
      renderSummary();
      document.getElementById('jobsMeta').textContent = `${allJobs.length} jobs · updated ${new Date().toLocaleTimeString()}`;
    } catch (e) {
      document.getElementById('jobsMeta').textContent = 'Failed to load.';
    }
  }

  function renderJobs() {
    const tbody = document.getElementById('jobsBody');
    if (!allJobs.length) {
      tbody.innerHTML = '<tr><td colspan="12" class="empty-state">No jobs yet.</td></tr>';
      return;
    }
    tbody.innerHTML = allJobs.map(j => {
      const profit = (parseFloat(j.revenue) || 0) - (parseFloat(j.materials_cost) || 0);
      const profitClass = profit > 0 ? 'profit-pos' : profit < 0 ? 'profit-neg' : 'muted';
      return `
        <tr onclick="openEditJob(${j.id})">
          <td>${fmtDate(j.completed_date)}</td>
          <td>
            <strong>${escHtml(j.name)}</strong>
            <div style="font-size:11px;color:#555">${escHtml(j.email || '')}</div>
          </td>
          <td>${escHtml(j.city || '—')}</td>
          <td>${escHtml(j.job_type || '—')}</td>
          <td style="text-align:center">${j.screens_count || '—'}</td>
          <td><span class="badge ${j.status}">${j.status === 'completed' ? 'Completed' : 'Turned Away'}</span></td>
          <td>${escHtml(j.payment_method || '—')}</td>
          <td style="text-align:right;font-weight:700;color:${j.revenue > 0 ? '#34d399' : '#555'}">${j.revenue > 0 ? fmt$(j.revenue) : '—'}</td>
          <td style="text-align:right;color:#f87171">${j.materials_cost > 0 ? fmt$(j.materials_cost) : '—'}</td>
          <td style="text-align:right"><span class="${profitClass}">${j.revenue > 0 ? fmt$(profit) : '—'}</span></td>
          <td style="font-size:11px;color:#555;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(j.notes || '')}</td>
          <td onclick="event.stopPropagation()">
            <button class="btn-edit" onclick="openEditJob(${j.id})">Edit</button>
            <button class="btn-del" onclick="deleteJob(${j.id}, '${escHtml(j.name)}')">Del</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function renderSummary() {
    const completed = allJobs.filter(j => j.status === 'completed');
    const totalRev = completed.reduce((s, j) => s + (parseFloat(j.revenue) || 0), 0);
    const totalMat = allJobs.reduce((s, j) => s + (parseFloat(j.materials_cost) || 0), 0);
    const profit = totalRev - totalMat;
    const margin = totalRev > 0 ? Math.round((profit / totalRev) * 100) : 0;
    const avgRev = completed.filter(j => j.revenue > 0).length
      ? (totalRev / completed.filter(j => j.revenue > 0).length).toFixed(0)
      : 0;

    document.getElementById('summary').innerHTML = `
      <div class="stat teal"><div class="label">Revenue</div><div class="value">${fmt$(totalRev)}</div></div>
      <div class="stat green"><div class="label">Gross Profit</div><div class="value">${fmt$(profit)}</div></div>
      <div class="stat red"><div class="label">Materials</div><div class="value">${fmt$(totalMat)}</div></div>
      <div class="stat amber"><div class="label">Margin</div><div class="value">${margin}%</div></div>
      <div class="stat blue"><div class="label">Avg / Job</div><div class="value">${fmt$(avgRev)}</div></div>
    `;
  }

  // ── Leads ──

  async function loadLeads() {
    document.getElementById('leadsMeta').textContent = 'Loading...';
    try {
      allLeads = await apiFetch('/api/leads');
      renderLeads(allLeads);
      document.getElementById('leadsMeta').textContent = `${allLeads.length} leads · updated ${new Date().toLocaleTimeString()}`;
      populateSubscriberSelect();
    } catch (e) {
      document.getElementById('leadsMeta').textContent = 'Failed to load.';
    }
  }

  function renderLeads(leads) {
    const tbody = document.getElementById('leadsBody');
    if (!leads.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No leads found.</td></tr>';
      return;
    }
    const serviceLabels = { window_screen: 'Window', door_screen: 'Door', porch_patio: 'Porch/Patio', multiple: 'Multiple', not_sure: 'Not Sure' };
    tbody.innerHTML = leads.map(l => `
      <tr>
        <td class="muted">#${l.id}</td>
        <td>${fmtDate(l.created_at)}</td>
        <td><strong>${escHtml(l.name)}</strong></td>
        <td style="font-size:12px">${escHtml(l.email || '')}</td>
        <td style="font-size:12px">${escHtml(l.phone_number || '')}</td>
        <td>${escHtml(l.city || '—')}</td>
        <td>${serviceLabels[l.service_type] || escHtml(l.service_type || '—')}</td>
        <td><div class="lead-desc" title="${escHtml(l.job_description || '')}">${escHtml(l.job_description || '')}</div></td>
      </tr>
    `).join('');
  }

  function filterLeads() {
    const q = document.getElementById('leadsSearch').value.toLowerCase();
    if (!q) { renderLeads(allLeads); return; }
    renderLeads(allLeads.filter(l =>
      (l.name || '').toLowerCase().includes(q) ||
      (l.email || '').toLowerCase().includes(q) ||
      (l.city || '').toLowerCase().includes(q) ||
      (l.phone_number || '').toLowerCase().includes(q)
    ));
  }

  // ── Modal ──

  function openAddJob() {
    editingJobId = null;
    document.getElementById('modalTitle').textContent = 'Add Job';
    document.getElementById('subscriberGroup').style.display = '';
    document.getElementById('subscriberReadGroup').style.display = 'none';
    clearForm();
    if (allLeads.length === 0) loadLeads().then(populateSubscriberSelect);
    else populateSubscriberSelect();
    openModal();
  }

  function openEditJob(id) {
    const job = allJobs.find(j => j.id === id);
    if (!job) return;
    editingJobId = id;
    document.getElementById('modalTitle').textContent = `Edit Job — ${job.name}`;
    document.getElementById('subscriberGroup').style.display = 'none';
    document.getElementById('subscriberReadGroup').style.display = '';
    document.getElementById('fSubscriberDisplay').value = `${job.name} (sub #${job.subscriber_id})`;

    document.getElementById('fStatus').value = job.status || 'completed';
    document.getElementById('fDate').value = job.completed_date ? job.completed_date.split('T')[0] : '';
    document.getElementById('fType').value = job.job_type || 'window';
    document.getElementById('fRevenue').value = job.revenue || '';
    document.getElementById('fMaterials').value = job.materials_cost || '';
    document.getElementById('fScreens').value = job.screens_count || '';
    document.getElementById('fPayment').value = job.payment_method || '';
    document.getElementById('fInvoice').value = job.invoice_number || '';
    document.getElementById('fNotes').value = job.notes || '';
    openModal();
  }

  function clearForm() {
    ['fSubscriber','fStatus','fDate','fType','fRevenue','fMaterials','fScreens','fPayment','fInvoice','fNotes'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = id === 'fStatus' ? 'completed' : id === 'fType' ? 'window' : '';
    });
    document.getElementById('subscriberPreview').textContent = '';
    hideModalError();
  }

  function openModal() {
    hideModalError();
    document.getElementById('jobModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('jobModal').classList.remove('open');
    editingJobId = null;
  }

  function showModalError(msg) {
    const el = document.getElementById('modalError');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideModalError() {
    document.getElementById('modalError').style.display = 'none';
  }

  function populateSubscriberSelect() {
    const sel = document.getElementById('fSubscriber');
    sel.innerHTML = '<option value="">— select a customer —</option>';
    allLeads.forEach(l => {
      const opt = document.createElement('option');
      opt.value = l.id;
      opt.textContent = `#${l.id} — ${l.name} (${l.city || 'unknown city'})`;
      sel.appendChild(opt);
    });
  }

  function onSubscriberChange() {
    const id = document.getElementById('fSubscriber').value;
    const preview = document.getElementById('subscriberPreview');
    if (!id) { preview.textContent = ''; return; }
    const lead = allLeads.find(l => l.id == id);
    if (lead) preview.textContent = `${lead.email || ''} · ${lead.phone_number || ''} · ${lead.city || ''}`;
  }

  async function saveJob() {
    hideModalError();
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const body = {
      status: document.getElementById('fStatus').value,
      completed_date: document.getElementById('fDate').value || null,
      revenue: document.getElementById('fRevenue').value || null,
      materials_cost: document.getElementById('fMaterials').value || null,
      screens_count: document.getElementById('fScreens').value || null,
      job_type: document.getElementById('fType').value || null,
      payment_method: document.getElementById('fPayment').value || null,
      invoice_number: document.getElementById('fInvoice').value || null,
      notes: document.getElementById('fNotes').value || null,
    };

    try {
      if (editingJobId) {
        await apiFetch(`/api/jobs/${editingJobId}`, { method: 'PATCH', body: JSON.stringify(body) });
      } else {
        const subId = document.getElementById('fSubscriber').value;
        if (!subId) { showModalError('Select a customer.'); btn.disabled = false; btn.textContent = 'Save Job'; return; }
        body.subscriber_id = subId;
        await apiFetch('/api/jobs', { method: 'POST', body: JSON.stringify(body) });
      }
      closeModal();
      await loadJobs();
    } catch (e) {
      showModalError('Save failed. Check all fields and try again.');
    }
    btn.disabled = false;
    btn.textContent = 'Save Job';
  }

  async function deleteJob(id, name) {
    if (!confirm(`Delete job for ${name}? This cannot be undone.`)) return;
    try {
      await apiFetch(`/api/jobs/${id}`, { method: 'DELETE' });
      await loadJobs();
    } catch (e) {
      alert('Delete failed.');
    }
  }

  // ── Helpers ──

  function fmt$(n) {
    return '$' + parseFloat(n || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function fmtDate(d) {
    if (!d) return '—';
    const s = typeof d === 'string' ? d.split('T')[0] : d.toISOString().split('T')[0];
    const [y, m, day] = s.split('-').map(Number);
    return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1] + ` ${day}, ${y}`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Close modal on overlay click
  document.getElementById('jobModal').addEventListener('click', e => {
    if (e.target === document.getElementById('jobModal')) closeModal();
  });
</script>
</body>
</html>
